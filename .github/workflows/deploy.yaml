# Path: .github/workflows/deploy.yaml
# Purpose: Professional CI/CD for GCR, Cloud Run, and Composer logic
# Idempotent: true

name: Deploy Medium RAG Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'api/**'
      - 'apt/**'
      - 'dags/**'
      - '.github/workflows/deploy.yaml'

env:
  PROJECT_ID: "my-playground-492309"
  REGION: "asia-southeast1"
  REPO_NAME: "medium-repo"
  COMPOSER_ENV_NAME: "medium-airflow-orchestrator"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate with GCP via Workload Identity Federation
      # See setup instructions provided by Antigravity in the chat
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Local Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 2. Verify DAG Integrity (Senior Engineering Gatekeeper)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies for Validation
        run: |
          pip install apache-airflow \
            apache-airflow-providers-google \
            apache-airflow-providers-cncf-kubernetes \
            google-cloud-aiplatform \
            google-cloud-bigquery \
            google-cloud-storage \
            python-dotenv \
            kubernetes \
            pylint \
            pytest \
            pytest-mock \
            pytest-cov

      - name: Run Unit Tests (Pytest)
        run: |
          echo "[INFO] Running full unit test suite with coverage"
          export PYTHONPATH=$PYTHONPATH:$(pwd)/dags:$(pwd)/api
          pytest tests/ --cov=dags --cov=api --cov-report=xml
          echo "[SUCCESS] All unit tests passed!"

      - name: Run Linter (Pylint)
        run: |
          echo "[INFO] Running Pylint on dags/ and api/"
          pylint dags/ api/ --errors-only

      - name: Verify All DAG Imports
        run: |
          echo "[INFO] Running deep import validation for all files in dags/"
          export PYTHONPATH=$PYTHONPATH:$(pwd)/dags
          # This command finds every .py file and attempts to compile it, catching hidden import errors
          find dags/ -name "*.py" -exec python3 -m py_compile {} +
          echo "[SUCCESS] All DAG files and modules are valid!"

      - name: Verify API Integrity
        run: |
          echo "[INFO] Running deep import validation for all files in api/"
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          find api/ -name "*.py" -exec python3 -m py_compile {} +
          echo "[SUCCESS] All API components are valid!"

      # 3. Build and Push Containers
      - name: Build & Push Ingest Image
        run: gcloud builds submit ./apt/tools/ingest --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/medium-ingest-node:latest --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }}

      - name: Build & Push API Image
        run: gcloud builds submit ./api --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/medium-rag-api:latest --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }}

      # 3. Deploy to Cloud Run
      - name: Deploy Cloud Run API
        run: |
          gcloud run deploy medium-rag-api \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/medium-rag-api:latest \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --quiet

      # 4. Sync DAGs and Python Tools to Cloud Composer
      - name: Sync Orchestration Layer
        run: |
          # Retrieve the DAG bucket name dynamically
          DAG_BUCKET=$(gcloud composer environments describe ${{ env.COMPOSER_ENV_NAME }} --location ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format="value(config.dagGcsPrefix)")
          
          # Sync DAGs recursively to include subdirectories like medium_rag_utils
          echo "[INFO] Syncing DAGs to ${DAG_BUCKET}"
          gcloud storage rsync dags ${DAG_BUCKET} --recursive --delete-unmatched-destination-objects
          
          # Sync Python utility tools used by the DAG tasks
          echo "[INFO] Syncing Python Tools to Data folder"
          gcloud storage rsync apt ${DAG_BUCKET}/../data/apt --recursive --delete-unmatched-destination-objects
